# Two-node lab used by tools/record_fixtures.py to record the unit-test
# fixtures from a real SR Linux node (srl1 is the recorded node, srl2 provides
# BGP/LLDP/ARP adjacencies).
name: napalm-record

mgmt:
  network: clab_napalm_record
  ipv4-subnet: 172.20.21.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:${SRL_VERSION:=latest}
  nodes:
    srl1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.21.11
    srl2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.21.12
  links:
    - endpoints: ["srl1:e1-1", "srl2:e1-1"]
    - endpoints: ["srl1:e1-2", "srl2:e1-2"]
    - endpoints: ["srl1:e1-3", "srl2:e1-3"]
