name: Validate Data

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Lint with Ruff
      run: uv run ruff check napalm_srlinux test tools examples

    - name: Run unit tests
      run: uv run pytest test/unit

  clab-ci-tests:
    runs-on: ubuntu-latest
    needs:
    - tests # Will only run if unit tests pass
    strategy:
      fail-fast: false
      matrix:
        # latest patch release of each supported SR Linux train
        srlinux-version: ["24.10", "25.10", "26.3"]
    name: clab-ci-tests (srlinux ${{ matrix.srlinux-version }})
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync

    - name: install latest clab
      run: bash -c "$(curl -sL https://get.containerlab.dev)"

    - name: start clab ci topo
      run: make deploy-clab-ci SRL_VERSION=${{ matrix.srlinux-version }}

    - name: Run all CI tests under test/ci
      run: make run-tests
