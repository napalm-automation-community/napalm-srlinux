name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: Publish package to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Build distribution
        run: uv build

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
